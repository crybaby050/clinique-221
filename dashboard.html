<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Document</title>
</head>

<body>

    <div class="container bg-gray-50 md:border-blue-900 md:flex">

        <!-- Barre du haut et side bar de la version desktop -->
        <div id="sidebar"
            class="sidebar w-full flex h-9  bg-[rgba(70,201,187,1)] text-white font-bold md:w-[250px] md:h-[100vh] md:flex md:flex-col md:justify-start md:items-start md:rounded-tr-[18px]  transition-all duration-500">
            <!-- Icône menu -->
            <div id="menuBtn"
                class="h-full w-1/10 flex justify-center items-center text-white cursor-pointer md:h-25 md:w-full">
                <!-- image de ma marque -->
                <div class="hidden md:block md:h-full md:w-full md:flex md:justify-center md:items-center">
                    <div
                        class="md:h-18 md:mt-2 md:w-18 md:rounded-full md:bg-[url('/image/logo.jpg')] md:bg-cover md:bg-center">
                    </div>
                </div>
                <i class="fas fa-bars md:h-full md:p-4"></i>
            </div>
            <!-- Search -->
            <!-- <div class="search w-9/10 flex justify-center items-center md:hidden">
                <div class="h-6/10 w-8/10 rounded-full bg-gray-100"></div>
            </div> -->
            <!-- menu de la versin desktop -->
            <div class="hidden md:block md:w-full">
                <ul class="flex flex-col p-2 space-y-2">
                    <li class="h-7 flex items-center hover:bg-white hover:text-[rgba(70,201,187,1)] text-[12px] gap-2 pl-2 rounded bg-[rgba(70,201,187,1)] text-white font-bold"><i class="fas fa-home"></i>Dashboard</li>
                    <li class="h-7 flex items-center hover:bg-white hover:text-[rgba(70,201,187,1)] text-[12px] gap-2 pl-2 rounded bg-[rgba(70,201,187,1)] text-white font-bold"><i class="fas fa-list"></i>Rendez-vous</li>
                </ul>
            </div>
        </div>
        <!-- Menu mobile -->
        <div id="mobileMenu" class="max-h-0 overflow-hidden transition-all duration-500 ease-in-out bg-gray-100 md:hidden">

            <ul class="flex flex-col p-2 space-y-2">
                <li class="h-6 text-[12px] pl-2 rounded bg-[rgba(70,201,187,1)] text-white font-bold flex items-center gap-2"><i class="fas fa-home"></i>Dashboard</li>
                <li class="h-6 text-[12px] hover:bg-white hover:text-[rgba(70,201,187,1)] pl-2 rounded bg-[rgba(70,201,187,1)] text-white font-bold flex items-center gap-2"><i class="fas fa-list"></i>Rendez-vous</li>
            </ul>
        </div>

        <div id="mainContent" class="md:flex-1 md:transition-all md:duration-500 md:border-red-900">
            <!-- titre -->
            <p class="font-bold p-3 md:text-xl md:font-black">DASHBOARD</p>
            <!-- les cards -->
            <div class="theCard flex flex-col p-3 items-center justify-center gap-5 md:grid md:grid-cols-3">
                <!-- cards pour les rendez-vous valider -->
                <div
                    class="card h-30 mt-2 w-[95%] rounded-xl shadow-[0_10px_20px_rgba(34,197,94,0.18)] border-b-4 border-green-500 flex">
                    <div class="right w-3/5 p-3 flex flex-col">
                        <p class="font-semibold text-[14px]">Rendez-vous valider</p>
                        <p class="font-black text-[32px] text-green-500 mt-5">12</p>
                    </div>
                    <div class="left w-2/5 flex justify-center items-center">
                        <div
                            class=" border-green-50 rounded-full h-10 w-10 shadow-[0_10px_25px_rgba(34,197,94,0.18)] flex items-center justify-center">
                            <i class="fas fa-calendar-check text-green-500"></i>
                        </div>
                    </div>
                </div>
                <!-- cards pour les rendez-vous en attentes -->
                <div
                    class="card h-30 mt-2 w-[95%] rounded-xl border-[rgba(59,130,246,1)] shadow-[0_10px_25px_rgba(59,130,246,0.15)] border-b-4 flex">
                    <div class="right w-3/5 p-3 flex flex-col">
                        <p class="font-semibold text-[14px]">Rendez-vous en attente</p>
                        <p class="font-black text-[32px] text-blue-500 mt-2">12</p>
                    </div>
                    <div class="left w-2/5 flex justify-center items-center">
                        <div
                            class=" border-green-50 rounded-full h-10 w-10 shadow-[0_10px_25px_rgba(34,197,94,0.18)] flex items-center justify-center">
                            <i class="fas fa-clock text-[rgba(59,130,246,1)]"></i>
                        </div>
                    </div>
                </div>
                <!-- cards pour les rendez-vous refusé -->
                <div
                    class="card h-30 mt-2 w-[95%] rounded-xl border-[rgba(239,68,68,1)] shadow-[0_10px_25px_rgba(239,68,68,0.15)] border-b-4 flex">
                    <div class="right w-3/5 p-3 flex flex-col">
                        <p class="font-semibold text-[14px]">Rendez-vous refusé</p>
                        <p class="font-black text-[32px] text-red-500 mt-5">12</p>
                    </div>
                    <div class="left w-2/5 flex justify-center items-center">
                        <div
                            class=" border-green-50 rounded-full h-10 w-10 shadow-[0_10px_25px_rgba(34,197,94,0.18)] flex items-center justify-center">
                            <i class="fas fa-calendar-xmark text-[rgba(239,68,68,1)]"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById("menuBtn");
        const sidebar = document.getElementById("sidebar");
        const mobileMenu = document.getElementById("mobileMenu");

        menuBtn.addEventListener("click", () => {

            if (window.innerWidth < 768) {
                // MOBILE
                if (mobileMenu.style.maxHeight) {
                    mobileMenu.style.maxHeight = null;
                } else {
                    mobileMenu.style.maxHeight = mobileMenu.scrollHeight + "px";
                }

            } else {
                // DESKTOP
                sidebar.classList.toggle("md:w-[250px]");
                sidebar.classList.toggle("md:w-[80px]");
            }

        });
    </script>

</body>

</html>
