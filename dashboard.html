<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Document</title>
</head>
<body>

    <div class="container bg-gray-50 md:border-1 md:flex">
        
        <!-- Barre du haut et side bar de la version desktop -->
        <div class="sidebar w-full flex h-9  bg-[rgba(70,201,187,1)] text-white font-bold md:w-[250px] md:h-[100vh] md:flex md:flex-col">
            <!-- Icône menu -->
            <div id="menuBtn" class="h-full w-1/10 flex justify-center items-center text-white cursor-pointer">
                <i class="fas fa-bars"></i>
            </div>
            <!-- Search -->
            <div class="search w-9/10 flex justify-center items-center md:hidden">
                <div class="h-6/10 w-8/10 rounded-full bg-gray-100"></div>
            </div>
            <!-- menu de la versin desktop -->
            <div>
            <ul class="flex flex-col p-2 space-y-2">
                <li class="h-5 text-[12px] pl-2 rounded bg-[rgba(70,201,187,1)] text-white font-bold">Dashboard</li>
                <li class="h-5 text-[12px] pl-2 rounded bg-[rgba(70,201,187,1)] text-white font-bold">Profil</li>
                <li class="h-5 text-[12px] pl-2 rounded bg-[rgba(70,201,187,1)] text-white font-bold">Paramètres</li>
            </ul>
        </div>
        </div>
        <!-- Menu mobile -->
        <div id="mobileMenu"
            class="max-h-0 overflow-hidden transition-all duration-500 ease-in-out bg-gray-100">
            
            <ul class="flex flex-col p-2 space-y-2">
                <li class="h-5 text-[12px] pl-2 rounded bg-[rgba(70,201,187,1)] text-white font-bold">Dashboard</li>
                <li class="h-5 text-[12px] pl-2 rounded bg-[rgba(70,201,187,1)] text-white font-bold">Profil</li>
                <li class="h-5 text-[12px] pl-2 rounded bg-[rgba(70,201,187,1)] text-white font-bold">Paramètres</li>
            </ul>
        </div>

        <div class="content">
            <!-- les cards -->
            <div class="theCard flex flex-col p-4 items-center justify-center gap-5">
                <!-- cards pour les rendez-vous valider -->
                <div class="card h-30 mt-2 w-[95%] rounded-xl shadow-[0_10px_20px_rgba(34,197,94,0.18)] border-b-4 border-green-500 flex">
                    <div class="right w-3/5 p-3 flex flex-col">
                        <p class="font-semibold text-[14px]">Rendez-vous valider</p>
                        <p class="font-black text-[32px] text-green-500 mt-5">12</p>
                    </div>
                    <div class="left w-2/5 flex justify-center items-center">
                        <div class=" border-green-50 rounded-full h-10 w-10 shadow-[0_10px_25px_rgba(34,197,94,0.18)] flex items-center justify-center">
                            <i class="fas fa-calendar-check text-green-500"></i>
                        </div>
                    </div>
                </div>
                <!-- cards pour les rendez-vous en attentes -->
                <div class="card h-30 mt-2 w-[95%] rounded-xl border-[rgba(59,130,246,1)] shadow-[0_10px_25px_rgba(59,130,246,0.15)] border-b-4 flex">
                    <div class="right w-3/5 p-3 flex flex-col">
                        <p class="font-semibold text-[14px]">Rendez-vous en attente</p>
                        <p class="font-black text-[32px] text-blue-500 mt-2">12</p>
                    </div>
                    <div class="left w-2/5 flex justify-center items-center">
                        <div class=" border-green-50 rounded-full h-10 w-10 shadow-[0_10px_25px_rgba(34,197,94,0.18)] flex items-center justify-center">
                            <i class="fas fa-clock text-[rgba(59,130,246,1)]"></i>
                        </div>
                    </div>
                </div>
                <!-- cards pour les rendez-vous refusé -->
                <div class="card h-30 mt-2 w-[95%] rounded-xl border-[rgba(239,68,68,1)] shadow-[0_10px_25px_rgba(239,68,68,0.15)] border-b-4 flex">
                    <div class="right w-3/5 p-3 flex flex-col">
                        <p class="font-semibold text-[14px]">Rendez-vous refusé</p>
                        <p class="font-black text-[32px] text-red-500 mt-5">12</p>
                    </div>
                    <div class="left w-2/5 flex justify-center items-center">
                        <div class=" border-green-50 rounded-full h-10 w-10 shadow-[0_10px_25px_rgba(34,197,94,0.18)] flex items-center justify-center">
                            <i class="fas fa-calendar-xmark text-[rgba(239,68,68,1)]"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");

    menuBtn.addEventListener("click", () => {

        if (mobileMenu.style.maxHeight) {
            mobileMenu.style.maxHeight = null;
        } else {
            mobileMenu.style.maxHeight = mobileMenu.scrollHeight + "px";
        }

    });
</script>

</body>
</html>
